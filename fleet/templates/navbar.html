{% load static %}
<div class="sidebar">
    <a class="navbar-brand d-block" href="{% url 'home' %}">Fleet Desk</a>
    <nav class="nav flex-column">
        <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">
            <span class="icon">
                <img src="{% static 'image/columns-gap.svg' %}" alt="Dashboard">
            </span>
            <span class="description">Dashboard</span>
        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'drivers' %}active{% endif %}" href="{% url 'drivers' %}">
            <span class="icon">
                <img src="{% static 'image/people.svg' %}" alt="Drivers">
            </span>
            <span class="description">Drivers</span>
        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'vehicles' %}active{% endif %}" href="{% url 'vehicles' %}">
            <span class="icon">
                <img src="{% static 'image/car-front.svg' %}" alt="Vehicles">
            </span>
            <span class="description">Vehicles</span>
        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'contracts' %}active{% endif %}" href="{% url 'contracts' %}">
            <span class="icon">
                <img src="{% static 'image/file-earmark-text.svg' %}" alt="Contracts">
            </span>
            <span class="description">Contracts</span>
        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'payments' %}active{% endif %}" href="{% url 'payments' %}">

        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'repairs' %}active{% endif %}" href="{% url 'repairs' %}">

            </span>
            <span class="description">Repairs</span>
        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'notifications' %}active{% endif %}" href="{% url 'notifications' %}">
            <span class="icon">
                <img src="{% static 'image/bell.svg' %}" alt="Notifications">
            </span>
            <span class="description">Notifications</span>
        </a>
    </nav>

    <div class="divider">
        <hr id="sidebar-divider">
        <a class="nav-link" href="{% url 'logout' %}">
            <span class="icon">
                <img src="{% static 'image/arrow-bar-right.svg' %}" alt="Logout">
            </span>
            <span class="description">Logout</span>
        </a>
