{% extends 'base.html' %}

{% block content %}
<main class="main-content">
    <div class="container-md my-4">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h3 class="h3">Driver Management</h3>
                <p class="text-muted mb-0">Manage your fleet drivers</p>
            </div>
            <button type="button" class="btn bg-dark text-white"> + Add Driver</button>
        </div>

        <div class="box mt-4 p-3">
            <div class="input-group mb-3">
                <span class="input-group-text bg-white border-0">
                    <img src="..\static\image\search.svg" alt="Search Icon">
                </span>
                <input type="text" class="form-control border-0" placeholder="Search drivers...">
            </div>
        </div>
    </div>
</main>
{% endblock %}
