{% extends 'base.html' %}
{% block title %}Drivers — Fleet Desk{% endblock %}

{% block content %}
<main class="main-content">
    <div class="container-md my-4">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h3 class="h3">Driver Management</h3>
                <p class="text-muted mb-0">Manage your fleet drivers</p>
            </div>
            <button type="button" class="btn bg-dark text-white" data-bs-toggle="modal" data-bs-target="#addDriverModal">
                <i class="bi bi-plus-lg me-1"></i>+ Add Driver
            </button>
        </div>


        <!-- Search -->
        <div class="box mt-4 p-3">
            <div class="input-group mb-3">
                <form method="get">
                <button class="input-group-text bg-white border-0" type="submit">
                    <img src="..\static\image\search.svg" alt="Search Icon">
                </button>
                <input type="search" name="q" value="{{ q }}" class="form-control border-0" placeholder="Search drivers...">
                {% if q %}<a href="{% url 'drivers' %}" class="btn btn-outline-secondary">Clear</a>{% endif %}
                </form>
            </div>
        </div>


    </div>
</main>
{% endblock %}
